name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  macos-smoke:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Ensure test dependency
        run: command -v jq >/dev/null || brew install jq
      - name: Public-private boundary
        run: python3 tests/public_private_boundary.py
      - name: Smoke test
        run: zsh tests/smoke.zsh
